name: 주간 지원금 갱신

on:
  schedule:
    - cron: '0 21 * * 1' # 매주 화요일 오전 6시 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 수집
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: node scripts/fetch.mjs
      - name: 태깅·샤드 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/process.mjs
      - name: 커밋
        run: |
          git config user.name "subsidy-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: 주간 지원금 데이터 갱신 ($(date +%Y-%m-%d))"
          git push
